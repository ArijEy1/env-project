name: Deploy

on:
  push:
    branches: [main, staging]
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
      url: ${{ github.ref_name == 'main' && 'https://medi.qzz.io' || 'https://stg.medi.qzz.io' }}
    env:
      DEPLOY_ENV: ${{ github.ref_name == 'main' && 'prod' || 'stg' }}
      PUBLIC_API_URL: ${{ github.ref_name == 'main' && 'https://medi.qzz.io/api' || 'https://stg.medi.qzz.io/api' }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Build release tarball
        run: deploy/azure/build-release.sh "$DEPLOY_ENV" "$PUBLIC_API_URL" /tmp/release.tar.gz

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VM_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload release
        run: |
          scp /tmp/release.tar.gz "azureuser@${{ secrets.VM_HOST }}:/tmp/release-${DEPLOY_ENV}.tar.gz"
          scp deploy/azure/sems "azureuser@${{ secrets.VM_HOST }}:/tmp/sems"

      - name: Install release (migrate, activate, health-check)
        run: |
          ssh "azureuser@${{ secrets.VM_HOST }}" \
            "sudo install -m 0755 /tmp/sems /usr/local/bin/sems \
             && sems install ${DEPLOY_ENV} /tmp/release-${DEPLOY_ENV}.tar.gz \
             && rm -f /tmp/release-${DEPLOY_ENV}.tar.gz /tmp/sems"

      - name: Deployment summary
        if: always()
        run: |
          {
            echo "## Deploy: \`${DEPLOY_ENV}\` — ${{ job.status }}"
            echo '```'
            ssh "azureuser@${{ secrets.VM_HOST }}" "sems status" || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
